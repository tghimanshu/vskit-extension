  <rect x="976" y="118" width="224" height="612" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="996" y="152" fill="#E2E8F0" font-size="18" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Up Next</text>

  <rect x="992" y="172" width="192" height="96" rx="10" fill="#111827" stroke="#334155"/>
  <text x="1002" y="204" fill="#F8FAFC" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Episode 13</text>
  <text x="1002" y="228" fill="#94A3B8" font-size="13" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">Galaxy Drift</text>
  <rect x="1002" y="238" width="86" height="18" rx="9" fill="#1D4ED8"/>
  <text x="1014" y="251" fill="#DBEAFE" font-size="11" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Queued</text>

  <rect x="992" y="284" width="192" height="96" rx="10" fill="#111827" stroke="#334155"/>
  <text x="1002" y="316" fill="#F8FAFC" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Episode 14</text>
  <text x="1002" y="340" fill="#94A3B8" font-size="13" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">Dark Sector</text>

  <rect x="992" y="396" width="192" height="96" rx="10" fill="#111827" stroke="#334155"/>
  <text x="1002" y="428" fill="#F8FAFC" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Episode 15</text>
  <text x="1002" y="452" fill="#94A3B8" font-size="13" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">Signal Echo</text>

  <rect x="992" y="524" width="192" height="168" rx="10" fill="#111827" stroke="#334155"/>
  <text x="1002" y="554" fill="#E2E8F0" font-size="14" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Extension Status</text>
  <text x="1002" y="578" fill="#93C5FD" font-size="13" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">• Video muted: No</text>
  <text x="1002" y="600" fill="#86EFAC" font-size="13" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">• Next episode: armed</text>
  <text x="1002" y="622" fill="#FDE68A" font-size="13" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">• Watch route detected</text>

  <!-- Footer branding -->
  <text x="88" y="776" fill="#60A5FA" font-size="20" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">VSKit Auto Unmute &amp; Auto Next</text>
  <text x="442" y="776" fill="#94A3B8" font-size="16" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">— keeps playback seamless across episodes</text>
</svg>
