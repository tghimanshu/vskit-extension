<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="player" x1="86" y1="166" x2="980" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Browser frame -->
  <g filter="url(#shadow)">
    <rect x="48" y="42" width="1184" height="716" rx="18" fill="#0B1220" stroke="#334155" stroke-width="2"/>
    <rect x="48" y="42" width="1184" height="56" rx="18" fill="#0F172A"/>
    <circle cx="82" cy="70" r="7" fill="#F87171"/>
    <circle cx="106" cy="70" r="7" fill="#FBBF24"/>
    <circle cx="130" cy="70" r="7" fill="#34D399"/>
    <rect x="180" y="56" width="990" height="28" rx="14" fill="#111827" stroke="#334155"/>
    <text x="206" y="75" fill="#94A3B8" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">https://vskit.tv/watch/space-odyssey?ep=12</text>
  </g>

  <!-- Left main content -->
  <rect x="84" y="118" width="872" height="612" rx="14" fill="#0B1220"/>

  <!-- Player panel -->
  <rect x="104" y="146" width="832" height="468" rx="14" fill="url(#player)" stroke="#334155"/>
  <rect x="122" y="164" width="796" height="382" rx="12" fill="#020617"/>

  <!-- Episode title -->
  <text x="126" y="592" fill="#E2E8F0" font-size="27" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Space Odyssey — Episode 12</text>
  <text x="126" y="622" fill="#94A3B8" font-size="18" font-weight="500" font-family="DejaVu Sans, Arial, sans-serif">VSKit watch page with auto-unmute active</text>

  <!-- Playback controls -->
  <rect x="122" y="558" width="796" height="10" rx="5" fill="#1E293B"/>
  <rect x="122" y="558" width="520" height="10" rx="5" fill="url(#accent)"/>
  <circle cx="642" cy="563" r="10" fill="#E2E8F0"/>

  <!-- Unmute badge -->
  <rect x="142" y="186" width="206" height="40" rx="20" fill="#0C4A6E" stroke="#22D3EE"/>
  <path d="M166 198H177V214H166V198Z" fill="#E0F2FE"/>
  <path d="M177 198L188 192V220L177 214V198Z" fill="#E0F2FE"/>
  <path d="M192 198C198 203 201 207 201 210C201 214 198 218 192 223" stroke="#67E8F9" stroke-width="3" stroke-linecap="round"/>
  <text x="210" y="212" fill="#E0F2FE" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Unmuted</text>

  <!-- Auto next badge -->
  <rect x="364" y="186" width="254" height="40" rx="20" fill="#052E16" stroke="#22C55E"/>
  <path d="M386 206H418" stroke="#86EFAC" stroke-width="4" stroke-linecap="round"/>
  <path d="M412 195L427 206L412 217" fill="#86EFAC"/>
  <text x="438" y="212" fill="#DCFCE7" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, sans-serif">Auto-next Enabled</text>

  <!-- Play triangle -->
  <path d="M470 286L470 434L600 360L470 286Z" fill="url(#accent)" fill-opacity="0.95"/>

